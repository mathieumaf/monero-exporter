version: 2
updates:
  # Go modules — grouped into a single weekly PR to keep noise down.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-modules:
        patterns:
          - "*"

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # The builder base image in the Dockerfile (e.g. golang:1.26-alpine).
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
