# Self-contained demo stack: monerod + monero-exporter + Prometheus + Grafana,
# all on official upstream images (no custom build needed).
#
#   docker compose up -d
#   open http://localhost:3000   (Grafana, anonymous admin — demo only)
#
# In a real deployment you would NOT run monerod here; you would point
# monero-exporter at your existing node (see the README's "RPC authentication"
# section for talking to a remote, authenticated daemon).

services:
  # A throwaway monerod purely so the stack works out of the box. simple-monerod
  # is a well-maintained community image. Its restricted RPC (18089) is exposed;
  # the unrestricted RPC (18081) stays on loopback and is reached by the exporter
  # through the shared network namespace below.
  monerod:
    image: ghcr.io/sethforprivacy/simple-monerod:latest
    container_name: monerod
    restart: unless-stopped
    volumes:
      - monerod-data:/home/monero/.bitmonero
    ports:
      - 18080:18080
      - 18089:18089
    command:
      - --rpc-bind-ip=127.0.0.1
      - --rpc-bind-port=18081
      - --rpc-restricted-bind-ip=0.0.0.0
      - --rpc-restricted-bind-port=18089
      - --no-zmq

  monero-exporter:
    image: ghcr.io/mathieumaf/monero-exporter:latest
    container_name: monero-exporter
    restart: unless-stopped
    # Share monerod's network namespace so the exporter can reach the
    # unrestricted RPC on loopback without exposing it or needing auth.
    network_mode: service:monerod
    command:
      - --monero-addr=http://127.0.0.1:18081

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/config.yaml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - 3000:3000

volumes:
  monerod-data:
  prometheus-data:
